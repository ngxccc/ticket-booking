services:
  postgres:
    image: postgres:18-alpine
    container_name: ticket-booking-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgrespassword}
      POSTGRES_DB: ${DB_DATABASE:-ticket_booking}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    command: ["postgres", "-c", "max_connections=500", "-c", "shared_buffers=256MB", "-c", "work_mem=16MB"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-ticket_booking}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - ticket-booking-net

  redis:
    image: redis:8-alpine
    container_name: ticket-booking-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    # Disable heavy disk saving to maximize locking speed, but keep light appendonly for reliability
    command: ["redis-server", "--maxclients", "10000", "--appendonly", "yes", "--appendfsync", "everysec"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - ticket-booking-net

volumes:
  pgdata:
  redisdata:

networks:
  ticket-booking-net:
    driver: bridge
