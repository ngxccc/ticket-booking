name: CD (Deploy to Production)

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "**/*.md"
      - ".gitignore"
jobs:
  integration:
    uses: ./.github/workflows/integration.yml

  deploy:
    name: Deploy to Production VM
    needs: integration
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Install Cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          rm cloudflared.deb

      - name: Configure SSH and SSH Keys
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/ticket-booking-v2_key.pem
          chmod 600 ~/.ssh/ticket-booking-v2_key.pem

          # Configure SSH config to use cloudflared proxy command
          cat <<EOF > ~/.ssh/config
          Host ticket-booking-vm
              HostName ssh-ticketbooking.ngxc.io.vn
              User azureuser
              ProxyCommand cloudflared access ssh --hostname %h
              IdentityFile ~/.ssh/ticket-booking-v2_key.pem
              StrictHostKeyChecking no
          EOF

      - name: Deploy to VPS using SSH & Doppler Token
        env:
          TUNNEL_SERVICE_TOKEN_ID: ${{ secrets.CF_CLIENT_ID }}
          TUNNEL_SERVICE_TOKEN_SECRET: ${{ secrets.CF_CLIENT_SECRET }}
        run: |
          ssh ticket-booking-vm "export DOPPLER_TOKEN='${{ secrets.DOPPLER_TOKEN }}' && cd /home/azureuser/ticket-booking && git fetch origin main && git reset --hard origin/main && ./scripts/redeploy.sh"
