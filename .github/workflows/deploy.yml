name: CD (Deploy to Production)

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "**/*.md"
      - ".gitignore"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  integration:
    uses: ./.github/workflows/integration.yml
    secrets: inherit
  deploy:
    name: Deploy to Production VM
    needs: integration
    runs-on: ubuntu-latest
    environment: production
    env:
      TUNNEL_SERVICE_TOKEN_ID: ${{ secrets.CF_CLIENT_ID }}
      TUNNEL_SERVICE_TOKEN_SECRET: ${{ secrets.CF_CLIENT_SECRET }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3

      - name: Build Application
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Install Production Dependencies
        run: |
          rm -rf node_modules
          bun install --prod --frozen-lockfile --ignore-scripts

      - name: Package Build Artifacts
        run: |
          tar -czf build.tar.gz dist node_modules package.json Dockerfile.prod Dockerfile.prod.dockerignore scripts docker-compose.yml drizzle.config.ts

      - name: Install Cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          rm cloudflared.deb

      - name: Configure SSH and SSH Keys
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/ticket-booking-v2_key.pem
          chmod 600 ~/.ssh/ticket-booking-v2_key.pem

          # Configure SSH config to use cloudflared proxy command
          cat <<EOF > ~/.ssh/config
          Host ticket-booking-vm
              HostName ssh-ticketbooking.ngxc.io.vn
              User azureuser
              ProxyCommand cloudflared access ssh --hostname %h
              IdentityFile ~/.ssh/ticket-booking-v2_key.pem
              StrictHostKeyChecking no
          EOF

      - name: Upload Build Artifacts to VPS
        run: |
          scp build.tar.gz ticket-booking-vm:/home/azureuser/ticket-booking/build.tar.gz

      - name: Deploy to VPS using SSH & Doppler Token
        run: |
          ssh ticket-booking-vm "export DOPPLER_TOKEN='${{ secrets.DOPPLER_TOKEN }}' && cd /home/azureuser/ticket-booking && tar -xzf build.tar.gz && ./scripts/redeploy.sh"
