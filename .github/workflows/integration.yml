name: Code Quality & Build Check

on:
  workflow_call:

jobs:
  integration:
    name: Code Quality & Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Environment
        uses: ./.github/setup-environment

      - name: Run CI Tasks (Lint, Test, Type-Check, Build)
        run: |
          bun run lint
          bun run check-types
          bun run test test:e2e
          bun run build
