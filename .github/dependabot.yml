version: 2
updates:
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "daily" # Kiểm tra update mỗi ngày
    open-pull-requests-limit: 12 # Giới hạn số PR mở cùng lúc
    groups:
      security-updates:
        patterns: ["*"]
        update-types: ["patch"]
        applies-to: "security-updates"
      production-dependencies:
        patterns: ["*"]
        update-types: ["minor", "patch"]
      development-dependencies:
        patterns: ["*"]
        update-types: ["patch"]

  # ── GitHub Actions workflows ──
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly" # Actions update ít hơn, tránh lạm dụng
    open-pull-requests-limit: 5

  # ── (Tùy chọn) Nếu sau này bạn dùng Docker ──
  # - package-ecosystem: "docker"
  #   directory: "/"
  #   schedule:
  #     interval: "weekly"
